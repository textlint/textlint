packages:
  - packages/*
  - examples/*
  - packages/@textlint/*
  - packages/textlint-scripts/examples/*
  - test/*
  - website

# Allowlist for packages whose build/postinstall scripts may run.
# pnpm blocks scripts by default; only entries set to `true` here are permitted.
# https://pnpm.io/settings#allowbuilds
allowBuilds:
  core-js: false
  esbuild: true

