# Automatically remove unused catalog entries on install
# https://pnpm.io/settings#cleanupunusedcatalogs
cleanupUnusedCatalogs: true

# Delay installing newly-published versions to mitigate supply chain
# attacks on hijacked npm packages. Value is in minutes (4320 = 3 days).
# https://pnpm.io/settings#minimumreleaseage
minimumReleaseAge: 4320
# Exclude textlint's own packages from the delay since we publish them.
minimumReleaseAgeExclude:
  - "@textlint/*"
  - textlint
  - "textlint-*"

# Force all @textlint/ast-node-types references to use the workspace version
# This prevents version conflicts where some packages might reference old versions (e.g., 13.4.1)
# that cause TypeScript type incompatibility errors in monorepo
overrides:
  "@textlint/ast-node-types": "workspace:*"
# https://pnpm.io/settings#verifydepsbeforerun
verifyDepsBeforeRun: "install"
